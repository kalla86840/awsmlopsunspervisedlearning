version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    AWS_SDK_LOAD_CONFIG: "1"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r requirements.txt
  pre_build:
    commands:
      - python -m compileall src pipelines scripts tests
      - pytest -q
  build:
    commands:
      - python pipelines/run_pipeline.py --wait --poll-seconds 60
      - python scripts/deploy_endpoint.py --wait

artifacts:
  files:
    - "**/*"
