version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    AWS_SDK_LOAD_CONFIG: "1"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r cars-kmeans-mlops/requirements.txt
  pre_build:
    commands:
      - python -m compileall cars-kmeans-mlops/src cars-kmeans-mlops/pipelines cars-kmeans-mlops/scripts
      - pytest -q cars-kmeans-mlops/tests
  build:
    commands:
      - python cars-kmeans-mlops/pipelines/run_pipeline.py --config cars-kmeans-mlops/config/pipeline.yaml --wait --poll-seconds 60
      - python cars-kmeans-mlops/scripts/deploy_endpoint.py --config cars-kmeans-mlops/config/pipeline.yaml --wait

artifacts:
  files:
    - cars-kmeans-mlops/**/*
